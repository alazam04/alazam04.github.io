<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #eef2f7;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-weight: bold;
  font-size: 20px;
}

/* CARD */
.card {
  background: white;
  margin: 15px;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

/* INPUT */
.input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin: 10px 0;
}

/* LIST */
.item {
  background: #f8fafc;
  padding: 12px;
  border-radius: 10px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
}

.navbar div {
  font-size: 12px;
  text-align: center;
  color: #888;
}

.active {
  color: #3b82f6;
  font-weight: bold;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="header">✨ NAMA ACAK GENERATOR ✨</div>

<!-- GENERATOR -->
<div class="card">
  <button class="btn" onclick="generateNama()">🔀 Generate & Copy Nama</button>
  <div id="hasil" style="text-align:center;margin-top:10px;font-weight:bold;"></div>
</div>

<!-- EMAIL -->
<div class="card">
  <b>Email Generator</b>
  <input id="email" class="input" readonly>
  <button class="btn" onclick="generateEmail()">Generate Email</button>
</div>

<!-- RIWAYAT -->
<div class="card">
  <b>Riwayat</b>
  <div id="list"></div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="active">🏠<br>Home</div>
  <div>⭐<br>Favorit</div>
  <div>🕒<br>Riwayat</div>
  <div>⚙️<br>Setting</div>
</div>

<div id="toast" class="toast">Disalin!</div>

<script>
const suku1=["ba","da","ra","za","ka","la","na","sa","ma","xo","vi"];
const suku2=["ran","din","tan","mon","lin","zor","vin","tor","xel","nor"];

let riwayat=JSON.parse(localStorage.getItem("riwayat"))||[];

function random(a){return a[Math.floor(Math.random()*a.length)]}

function showToast(){
  let t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function generateNama(){
  let nama=random(suku1)+random(suku2);
  document.getElementById("hasil").innerText=nama;
  navigator.clipboard.writeText(nama);
  showToast();
}

function generateEmail(){
  let email=random(suku1)+random(suku2)+Math.floor(Math.random()*100)+"@gmail.com";
  document.getElementById("email").value=email;
  
  riwayat.unshift(email);
  localStorage.setItem("riwayat",JSON.stringify(riwayat));
  render();
  navigator.clipboard.writeText(email);
  showToast();
}

function render(){
  let html="";
  riwayat.slice(0,10).forEach(e=>{
    html+=`<div class="item" onclick="copy('${e}')">${e}</div>`;
  });
  document.getElementById("list").innerHTML=html;
}

function copy(text){
  navigator.clipboard.writeText(text);
  showToast();
}

render();
</script>

</body>
</html>
