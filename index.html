<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Tool Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  padding:20px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  margin-bottom:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.title{
  font-size:14px;
  font-weight:600;
  margin-bottom:10px;
  color:#93c5fd;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  outline:none;
}

.result{
  margin-top:10px;
  font-weight:600;
  color:#22c55e;
}

.link-box{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  font-size:12px;
  word-break:break-all;
  color:#cbd5e1;
}

.copy{
  margin-top:5px;
  padding:6px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
  font-size:12px;
  cursor:pointer;
}

.otp{
  font-size:22px;
  font-weight:700;
  color:#fbbf24;
  margin-top:10px;
}

.small{
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">⚡ PREMIUM TOOL PANEL</div>

<div class="container">

<!-- GENERATOR -->
<div class="card">
  <div class="title">🎲 Generator Nama</div>
  <button class="btn" onclick="genNama()">Generate Nama</button>
  <div class="result" id="nama">-</div>
</div>

<!-- OTP -->
<div class="card">
  <div class="title">🔐 OTP AUTO</div>

  <input class="input" id="idOtp" placeholder="Masukkan ID order">

  <button class="btn" onclick="saveID()">Simpan ID</button>

  <div class="small">ID: <span id="id">-</span></div>
  <div class="small">📱 Nomor: <span id="nomor">-</span></div>

  <div class="otp" id="otp">-</div>
</div>

<!-- LINK -->
<div class="card">
  <div class="title">🔗 Link Order</div>
  <div id="links"></div>
</div>

</div>

<script>

// ===== GENERATOR =====
const first=["Ahmad","Budi","Siti","Rina","Dewi","Aisyah","Rizky","Fajar"];
const last=["Santoso","Pratama","Wijaya","Saputra","Rahman","Firmansyah"];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function genNama(){
  let nama = rand(first)+" "+rand(last);
  document.getElementById("nama").innerText = nama;
  navigator.clipboard.writeText(nama);
}

// ===== LINKS =====
const data=[
{n:"AWAW",l:"https://s.shopee.co.id/6VKFY7rZoL"},
{n:"WHITE CYBER",l:"https://s.shopee.co.id/9fHHK4KU73"},
{n:"ALFA DIGITAL",l:"https://s.shopee.co.id/4qC1ZEp4uu"}
];

let html="";
data.forEach(d=>{
  html+=`
    <div class="link-box">
      <b>${d.n}</b><br>
      ${d.l}
      <button class="copy" onclick="copy('${d.l}')">Copy</button>
    </div>
  `;
});
document.getElementById("links").innerHTML=html;

function copy(t){
  navigator.clipboard.writeText(t);
}

// ===== OTP =====
let currentID="";

function saveID(){
  let id=document.getElementById("idOtp").value;
  if(!id) return;

  currentID=id;
  localStorage.setItem("hero_id",id);

  ambilOTP();
}

window.onload=function(){
  let saved=localStorage.getItem("hero_id");
  if(saved){
    currentID=saved;
    document.getElementById("idOtp").value=saved;
    ambilOTP();
  }
}

function ambilOTP(){
  if(!currentID) return;

  fetch(`https://generator-nama.vercel.app/api/otp?id=${currentID}`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("id").innerText=d.id||"-";
    document.getElementById("nomor").innerText=d.number||"-";
    document.getElementById("otp").innerText=d.otp||"-";

    if(d.otp){
      navigator.clipboard.writeText(d.otp);
    }
  });
}

setInterval(ambilOTP,5000);

</script>

</body>
</html>
