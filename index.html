<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Tool Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{ margin:0; font-family:'Poppins',sans-serif; background:#0f172a; color:white; }
.header{ padding:20px; text-align:center; font-size:18px; font-weight:700; background:linear-gradient(90deg,#3b82f6,#06b6d4); }
.container{ padding:15px; }
.card{ background:#1e293b; margin-bottom:15px; padding:15px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.3); }
.title{ font-size:14px; font-weight:600; margin-bottom:10px; color:#93c5fd; }
.btn{ width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:white; font-weight:600; cursor:pointer; }
.btn-hero{ background:linear-gradient(90deg,#ee4d2d,#ff7337); margin-top: 10px; } 
.input{ width:100%; padding:10px; border-radius:10px; border:none; outline:none; box-sizing:border-box; background:#0f172a; color:#fff; text-align:center; font-weight:bold; }
.result{ margin-top:10px; font-weight:600; color:#22c55e; }
.otp{ font-size:22px; font-weight:700; color:#fbbf24; margin-top:10px; }
.small{ font-size:12px; color:#94a3b8; display: flex; align-items: center; gap: 8px; margin-top: 5px; }
.link-box{ background:#0f172a; padding:10px; border-radius:10px; margin-top:8px; font-size:12px; word-break:break-all; color:#cbd5e1; }
.copy-mini{ padding:4px 8px; border:none; border-radius:5px; background:#334155; color:white; font-size:10px; cursor:pointer; font-weight: 600; }
.copy-mini:active{ background: #475569; }
.copy-big{ margin-top:5px; padding:6px; width:100%; border:none; border-radius:8px; background:#334155; color:white; font-size:12px; cursor:pointer; }
</style>
</head>

<body>
<div class="header">⚡ PREMIUM TOOL PANEL</div>
<div class="container">

<div class="card">
  <div class="title">🎲 Generator Nama</div>
  <button class="btn" onclick="genNama()">Generate Nama</button>
  <div class="result" id="nama">-</div>
</div>

<div class="card">
  <div class="title">🛍️ SMS HERO (SHOPEE)</div>

  <div style="font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-align:center;">Kode Layanan (Shopee = sh)</div>
  <input class="input" id="layanan" value="sh" placeholder="Kode API, misal: sh">

  <button class="btn btn-hero" onclick="pesanNomor()">Pesan Nomor Shopee</button>

  <div class="small" style="margin-top: 15px;">
    ID: <span id="id" style="color:white;">-</span>
  </div>
  
  <div class="small">
    📱 Nomor: <span id="nomor" style="color:white; font-weight:bold;">-</span>
    <button id="btnCopyNomor" class="copy-mini" style="display:none;" onclick="copyTeks('nomor')">Copy</button>
  </div>

  <div class="otp" id="otp">-</div>
  <div id="statusCheck" class="small" style="color:#fbbf24; font-style:italic;"></div>
</div>

<div class="card">
  <div class="title">🔗 Link Order</div>
  <div id="links"></div>
</div>

</div>

<script>
// ===== GENERATOR NAMA =====
const first=["Ahmad","Budi","Siti","Rina","Dewi","Aisyah","Rizky","Fajar"];
const last=["Santoso","Pratama","Wijaya","Saputra","Rahman","Firmansyah"];
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function genNama(){
  let nama = rand(first)+" "+rand(last);
  document.getElementById("nama").innerText = nama;
  navigator.clipboard.writeText(nama);
}

// ===== LINKS =====
const data=[
  {n:"AWAW",l:"https://s.shopee.co.id/6VKFY7rZoL"},
  {n:"WHITE CYBER",l:"https://s.shopee.co.id/9fHHK4KU73"},
  {n:"ALFA DIGITAL",l:"https://s.shopee.co.id/4qC1ZEp4uu"}
];
let html="";
data.forEach(d=>{
  html+=`<div class="link-box"><b>${d.n}</b><br>${d.l}<button class="copy-big" onclick="copyDirect('${d.l}')">Copy Link</button></div>`;
});
document.getElementById("links").innerHTML=html;

function copyDirect(t){ navigator.clipboard.writeText(t); alert("Link disalin!"); }

function copyTeks(elementId) {
  const teks = document.getElementById(elementId).innerText;
  if(teks && teks !== "-" && teks !== "Sedang memesan...") {
    navigator.clipboard.writeText(teks);
    alert("Berhasil disalin!");
  }
}

// ===== SMS HERO SYSTEM =====
let currentID = "";
let checkInterval;

function pesanNomor(){
  let layanan = document.getElementById("layanan").value || "sh";

  document.getElementById("nomor").innerText = "Sedang memesan...";
  document.getElementById("id").innerText = "-";
  document.getElementById("otp").innerText = "-";
  document.getElementById("statusCheck").innerText = "";
  document.getElementById("btnCopyNomor").style.display = "none";
  
  // Membawa parameter layanan dari input
  fetch(`https://aihomestore.alazam04.workers.dev/api/order?service=${layanan}`)
  .then(r => r.json())
  .then(d => {
    if(d.number){
      currentID = d.id;
      document.getElementById("id").innerText = d.id;
      document.getElementById("nomor").innerText = d.number;
      document.getElementById("otp").innerText = "Menunggu SMS...";
      document.getElementById("statusCheck").innerText = "Auto-checking OTP aktif...";
      
      document.getElementById("btnCopyNomor").style.display = "inline-block";
      navigator.clipboard.writeText(d.number);

      clearInterval(checkInterval);
      checkInterval = setInterval(cekOTP, 5000);
    } else {
      alert("Gagal: " + (d.error || "Saldo habis / Nomor Kosong"));
      document.getElementById("nomor").innerText = "-";
    }
  }).catch(e => {
    alert("Koneksi Error.");
  });
}

function cekOTP(){
  if(!currentID) return;

  fetch(`https://aihomestore.alazam04.workers.dev/api/check?id=${currentID}`)
  .then(r => r.json())
  .then(d => {
    if(d.otp && d.otp !== "-"){
      document.getElementById("otp").innerText = d.otp;
      document.getElementById("statusCheck").innerText = "OTP Berhasil Diterima!";
      
      navigator.clipboard.writeText(d.otp);
      clearInterval(checkInterval); 
    }
  });
}
</script>
</body>
    </html>
