<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator & Link Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eef2f7;
}

.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  color:white;
  cursor:pointer;
}

.item{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.item a{
  text-decoration:none;
  color:#3b82f6;
  font-size:13px;
  word-break: break-all;
}

.copy-btn{
  margin-top:6px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:white;
  padding:8px 16px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}
.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="header">✨ GENERATOR & LINK ORDER ✨</div>

<!-- NAMA -->
<div class="card">
  <h3>Nama</h3>
  <button class="btn" onclick="generateNama()">Generate & Copy</button>
  <div id="hasil" style="margin-top:10px;font-weight:bold;"></div>
</div>

<!-- LINK ORDER -->
<div class="card">
  <h3>Link Order</h3>
  <div id="links"></div>
</div>

<div id="toast" class="toast">Link disalin!</div>

<script>
// ===== NAMA =====
const depan=["Ahmad","Budi","Siti","Rina","Michael","Aisyah","Daniel","Putri"];
const belakang=["Santoso","Wijaya","Saputra","Pratama","Smith","Brown","Rahman"];

function random(a){
  return a[Math.floor(Math.random()*a.length)];
}

function generateNama(){
  let nama = random(depan)+" "+random(belakang);
  document.getElementById("hasil").innerText = nama;
  navigator.clipboard.writeText(nama);
}

// ===== LINK DATA =====
const data = [
{nama:"AWAW", link:"https://s.shopee.co.id/6VKFY7rZoL"},
{nama:"AWAW", link:"https://s.shopee.co.id/6px5wm8CN6"},
{nama:"AWAW", link:"https://s.shopee.co.id/901aWmbQPp"},
{nama:"AWAW", link:"https://s.shopee.co.id/7ppd8fwWIc"},

{nama:"WHITE CYBER", link:"https://s.shopee.co.id/9fHHK4KU73"},
{nama:"ALFA DIGITAL", link:"https://s.shopee.co.id/4qC1ZEp4uu"},
{nama:"SRIBUFOLLS", link:"https://s.shopee.co.id/3Vgdyp7e4p"},
{nama:"HELENA STUFF", link:"https://s.shopee.co.id/AADXv6H81t"},
{nama:"SECRET PANEL", link:"https://s.shopee.co.id/4AwKm7hE75"},
{nama:"PROMETIXPANEL", link:"https://s.shopee.co.id/9KeQve7UK9"},
{nama:"YOAKE", link:"https://s.shopee.co.id/8fOk8T99r5"},
{nama:"YOAKE", link:"https://s.shopee.co.id/3LNDmhKKrw"},

{nama:"MAMA - WHITE CYBER", link:"https://s.shopee.co.id/2g7J598NmS"}
];

// ===== RENDER =====
function renderLinks(){
  let html="";
  data.forEach(d=>{
    html += `
      <div class="item">
        <b>${d.nama}</b><br>
        <a href="${d.link}" target="_blank">${d.link}</a><br>
        <button class="copy-btn" onclick="copyLink('${d.link}')">Copy Link</button>
      </div>
    `;
  });
  document.getElementById("links").innerHTML = html;
}

// ===== COPY =====
function copyLink(link){
  navigator.clipboard.writeText(link);
  showToast();
}

function showToast(){
  let t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

renderLinks();
</script>

</body>
</html>
