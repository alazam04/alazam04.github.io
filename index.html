<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Tool</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  color:white;
  cursor:pointer;
}

.item{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.item a{
  text-decoration:none;
  color:#3b82f6;
  font-size:13px;
  word-break:break-all;
}

.copy-btn{
  margin-top:6px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:12px;
  cursor:pointer;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:white;
  padding:8px 16px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="header">✨ TOOL ALL-IN-ONE ✨</div>

<!-- NAMA -->
<div class="card">
  <h3>Generator Nama</h3>
  <button class="btn" onclick="generateNama()">Generate & Copy</button>
  <div id="hasil" style="margin-top:10px;font-weight:bold;"></div>
</div>

<!-- OTP AUTO -->
<div class="card">
<div class="card">
  <h3>OTP HeroSMS</h3>

  <input id="idOtp" class="input" placeholder="Masukkan ID pertama kali saja">
  <button class="btn" onclick="simpanID()">Simpan ID</button>

  <div style="margin-top:10px;">
    🆔 ID: <span id="id">-</span>
  </div>

  <div>
    📱 Nomor: <span id="nomor">-</span>
  </div>

  <div id="otp" style="font-size:22px;font-weight:bold;margin-top:5px;">-</div>
</div>

<!-- LINK -->
<div class="card">
  <h3>Link Order</h3>
  <div id="links"></div>
</div>

<div id="toast" class="toast">Disalin!</div>

<script>
// ===== NAMA =====
const depan=["Ahmad","Budi","Siti","Rina","Michael","Aisyah","Daniel","Putri"];
const belakang=["Santoso","Wijaya","Saputra","Pratama","Smith","Brown","Rahman"];

function random(a){return a[Math.floor(Math.random()*a.length)]}

function generateNama(){
  let nama=random(depan)+" "+random(belakang);
  document.getElementById("hasil").innerText=nama;
  navigator.clipboard.writeText(nama);
  showToast();
}

// ===== LINK =====
const data = [
{nama:"AWAW", link:"https://s.shopee.co.id/6VKFY7rZoL"},
{nama:"AWAW", link:"https://s.shopee.co.id/6px5wm8CN6"},
{nama:"AWAW", link:"https://s.shopee.co.id/901aWmbQPp"},
{nama:"AWAW", link:"https://s.shopee.co.id/7ppd8fwWIc"},
{nama:"WHITE CYBER", link:"https://s.shopee.co.id/9fHHK4KU73"},
{nama:"ALFA DIGITAL", link:"https://s.shopee.co.id/4qC1ZEp4uu"},
{nama:"SRIBUFOLLS", link:"https://s.shopee.co.id/3Vgdyp7e4p"},
{nama:"HELENA STUFF", link:"https://s.shopee.co.id/AADXv6H81t"},
{nama:"SECRET PANEL", link:"https://s.shopee.co.id/4AwKm7hE75"},
{nama:"PROMETIXPANEL", link:"https://s.shopee.co.id/9KeQve7UK9"},
{nama:"YOAKE", link:"https://s.shopee.co.id/8fOk8T99r5"},
{nama:"YOAKE", link:"https://s.shopee.co.id/3LNDmhKKrw"},
{nama:"MAMA - WHITE CYBER", link:"https://s.shopee.co.id/2g7J598NmS"}
];

function renderLinks(){
  let html="";
  data.forEach(d=>{
    html+=`
      <div class="item">
        <b>${d.nama}</b><br>
        <a href="${d.link}" target="_blank">${d.link}</a><br>
        <button class="copy-btn" onclick="copyText('${d.link}')">Copy Link</button>
      </div>
    `;
  });
  document.getElementById("links").innerHTML=html;
}

// ===== COPY =====
function copyText(text){
  navigator.clipboard.writeText(text);
  showToast();
}

function showToast(){
  let t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

// ===== OTP AUTO =====
function ambilOTP(){
  let currentID = "";

// simpan ID
function simpanID(){
  let id = document.getElementById("idOtp").value;

  if(!id){
    alert("Masukkan ID dulu");
    return;
  }

  localStorage.setItem("hero_id", id);
  currentID = id;
  ambilOTP();
}

// load otomatis
window.onload = function(){
  let saved = localStorage.getItem("hero_id");

  if(saved){
    currentID = saved;
    document.getElementById("idOtp").value = saved;
    ambilOTP();
  }
}

// ambil OTP
function ambilOTP(){
  if(!currentID) return;

  fetch(`https://generator-nama.vercel.app/api/otp?id=${currentID}`)
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("id").innerText = currentID;
      document.getElementById("nomor").innerText = data.number || "-";
      document.getElementById("otp").innerText = data.otp || "-";

      if(data.otp && data.otp !== "Menunggu OTP"){
        navigator.clipboard.writeText(data.otp);
      }
    });
}

// auto refresh
setInterval(ambilOTP,5000);
}
  
// INIT
renderLinks();
</script>

</body>
</html>
