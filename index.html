<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Engine - Tri Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --bg-dark: #121826;
            --card-dark: #1e293b;
            --accent-orange: #f97316;
            --text-light: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
        }

        .main-card {
            background-color: var(--card-dark);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #60a5fa;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* FIX: Mengecilkan tulisan pilihan server dan operator */
        .form-select {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 0.8rem; /* Ukuran font dikecilkan */
            font-weight: 500;
        }

        .form-select:focus {
            background-color: #0f172a;
            color: white;
            border-color: var(--accent-orange);
            box-shadow: none;
        }

        .btn-order {
            background-color: var(--accent-orange);
            color: white;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-order:active {
            transform: scale(0.98);
        }

        .otp-display {
            background-color: #0f172a;
            border: 2px dashed #334155;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }

        #otp-box {
            font-size: 2.8rem;
            font-weight: 800;
            color: #fbbf24;
            letter-spacing: 5px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .btn-util {
            background-color: #334155;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            width: 48%;
        }

        #notif-sound { display: none; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 500px;">
        
        <div class="main-card">
            <div class="section-title">🚀 SHOPEE OTP ENGINE</div>
            
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <select id="serverSelect" class="form-select">
                        <option value="hero">🚀 HERO SMS</option>
                        <option value="rumah">🏠 RUMAH OTP</option>
                        <option value="smscode">⚡ SMSCODE.GG</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="operatorSelect" class="form-select">
                        <option value="any">Termurah (Otomatis)</option>
                        <option value="indosat">Indosat</option>
                        <option value="telkomsel">Telkomsel</option>
                        <option value="xl">XL Axiata</option>
                        <option value="three">Three (3)</option>
                    </select>
                </div>
            </div>

            <button class="btn-order" onclick="orderNumber()" id="btnOrder">Ambil Nomor Shopee</button>

            <div class="mt-4">
                <div class="data-row">
                    <span class="text-secondary">Order ID</span>
                    <span id="display-id">-</span>
                </div>
                <div class="data-row">
                    <span class="text-secondary">Nomor HP</span>
                    <b id="display-number">Ready...</b>
                </div>
            </div>

            <div class="otp-display">
                <div id="otp-box">WAITING</div>
                <div class="status-text" id="status-desc">Menunggu SMS masuk...</div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn-util" onclick="copyNumber()"><i class="fas fa-copy"></i> Copy Nomor</button>
                <button class="btn-util" onclick="clearData()"><i class="fas fa-trash"></i> Clear Data</button>
            </div>
        </div>

        <div class="main-card">
            <div class="section-title">🏠 NAMA DAN ALAMAT</div>
            <div id="utility-content" class="p-2 bg-dark rounded border border-secondary" style="font-size: 0.9rem;">
                <div class="mb-2">Nama: <b id="util-nama" class="text-success">-</b></div>
                <div class="mb-2">Alamat: <b id="util-alamat" class="text-success">-</b></div>
                <div>Detail: <b id="util-detail" class="text-success">-</b></div>
            </div>
            <button class="btn-util w-100 mt-3" onclick="generateRandomData()">Generate Data Baru</button>
        </div>

    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const API_BASE = "https://aihomestore.alazam04.workers.dev/api";
        let checkTimer = null;

        window.onload = () => {
            if(localStorage.getItem('order_id')) {
                document.getElementById('display-id').innerText = localStorage.getItem('order_id');
                document.getElementById('display-number').innerText = localStorage.getItem('phone');
                startPolling();
            }
            if(localStorage.getItem('pref_server')) document.getElementById('serverSelect').value = localStorage.getItem('pref_server');
            if(localStorage.getItem('pref_op')) document.getElementById('operatorSelect').value = localStorage.getItem('pref_op');
        };

        async function orderNumber() {
            const server = document.getElementById('serverSelect').value;
            const operator = document.getElementById('operatorSelect').value;
            const btn = document.getElementById('btnOrder');

            localStorage.setItem('pref_server', server);
            localStorage.setItem('pref_op', operator);

            btn.disabled = true;
            btn.innerText = "Ordering...";
            document.getElementById('display-number').innerText = "Ordering...";

            try {
                const res = await fetch(`${API_BASE}/order?server=${server}&operator=${operator}`);
                const data = await res.json();

                if (data.id && data.number) {
                    localStorage.setItem('order_id', data.id);
                    localStorage.setItem('phone', data.number);
                    
                    document.getElementById('display-id').innerText = data.id;
                    document.getElementById('display-number').innerText = data.number;
                    document.getElementById('otp-box').innerText = "WAITING";
                    document.getElementById('otp-box').style.color = "#fbbf24";
                    document.getElementById('status-desc').innerText = "Menunggu SMS masuk...";
                    
                    startPolling();
                } else {
                    alert("Gagal: " + (data.error || "Server sibuk"));
                    document.getElementById('display-number').innerText = "Ready...";
                }
            } catch (e) {
                alert("Koneksi ke Worker Error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Ambil Nomor Shopee";
            }
        }

        function startPolling() {
            if(checkTimer) clearInterval(checkTimer);
            checkTimer = setInterval(checkOTP, 5000); 
        }

        async function checkOTP() {
            const id = localStorage.getItem('order_id');
            const server = localStorage.getItem('pref_server');
            if(!id) return;

            try {
                const res = await fetch(`${API_BASE}/check?id=${id}&server=${server}`);
                const data = await res.json();

                if (data.otp && data.otp !== "-") {
                    document.getElementById('otp-box').innerText = data.otp;
                    
                    if (data.otp.startsWith("ERR:") || data.otp.startsWith("STAT:")) {
                        document.getElementById('otp-box').style.color = "#ef4444"; 
                        document.getElementById('status-desc').innerText = "Cek Status...";
                    } else {
                        document.getElementById('otp-box').style.color = "#4ade80"; 
                        document.getElementById('status-desc').innerText = "OTP MASUK!";
                        document.getElementById('notif-sound').play();
                        navigator.clipboard.writeText(data.otp);
                        clearInterval(checkTimer);
                    }
                }
            } catch (e) {}
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }

        function copyNumber() {
            const num = document.getElementById('display-number').innerText;
            if(num && num !== "Ready...") {
                navigator.clipboard.writeText(num);
                alert("Nomor HP disalin!");
            }
        }

        function generateRandomData() {
            const names = ["Budi Santoso", "Siti Aminah", "Andi Wijaya", "Maya Wibowo", "Rian Hidayat", "Dewi Lestari"];
            const streets = ["Jl. Merdeka No. 10", "Jl. Gajah Mada No. 14", "Jl. Melati Blok C", "Perum Cahaya Indah No. 5"];
            const cities = ["Jakarta (10110)", "Bandung (40111)", "Surabaya (60111)", "Tangerang (15111)"];

            document.getElementById('util-nama').innerText = names[Math.floor(Math.random() * names.length)];
            document.getElementById('util-alamat').innerText = streets[Math.floor(Math.random() * streets.length)];
            document.getElementById('util-detail').innerText = cities[Math.floor(Math.random() * cities.length)];
        }
    </script>
</body>
                                                                   </html>
