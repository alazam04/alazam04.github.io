<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aihomestore Panel V12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --primary: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    --shopee: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%);
    --accent: #fbbf24;
    --text: #f8fafc;
}

body { margin:0; font-family:'Poppins',sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { padding: 20px 15px; max-width: 500px; margin: auto; }

.card { background: var(--card); margin-bottom: 20px; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.title { font-size: 12px; font-weight: 700; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; border-left: 4px solid #3b82f6; padding-left: 10px; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
.btn-shopee { background: var(--shopee); box-shadow: 0 4px 12px rgba(238, 77, 45, 0.3); }
.btn:active { transform: scale(0.96); opacity: 0.9; }

.otp-container { background: #0f172a; border-radius: 15px; padding: 15px; margin-top: 15px; text-align: center; border: 2px dashed #334155; }
.otp-box { font-size: 30px; font-weight: 800; color: var(--accent); letter-spacing: 8px; text-indent: 8px; }
.status-text { font-size: 11px; color: #60a5fa; margin-top: 5px; font-style: italic; }

.info-grid { margin-top: 15px; display: grid; gap: 8px; }
.info-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.info-label { color: #94a3b8; }
.info-val { font-weight: 600; color: #f1f5f9; }

.result-address { margin-top: 5px; background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 12px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }
.address-val { color: #22c55e; font-weight: 600; display: block; }

.select-op { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 8px; outline: none; font-family: 'Poppins'; }

#toast { visibility: hidden; min-width: 200px; background-color: #3b82f6; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 100; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
#toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

.link-group { background: #0f172a; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.link-label { font-size: 13px; font-weight: 600; cursor: pointer; }
.icon-btn { background: #334155; border: none; color: white; padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
</style>
</head>
<body>

<div id="toast">Disalin!</div>

<div class="container">

    <div class="card">
        <div class="title">🛍️ Shopee OTP Engine</div>
        
        <div style="display:flex; gap:8px;">
            <select class="select-op" id="server" onchange="saveOp()" style="flex:1;">
                <option value="hero">🔥 HERO SMS</option>
                <option value="rumah">🏠 RUMAH OTP</option>
            </select>
            <select class="select-op" id="operator" onchange="saveOp()" style="flex:1;">
                <option value="any">Termurah</option>
                <option value="telkomsel">Telkomsel</option>
                <option value="indosat">Indosat</option>
                <option value="xl">XL Axiata</option>
                <option value="three">Tri (3)</option>
                <option value="axis">Axis</option>
            </select>
        </div>

        <button class="btn btn-shopee" onclick="pesanNomor()" style="margin-top: 4px;">AMBIL NOMOR SHOPEE</button>

        <div class="info-grid">
            <div class="info-item"><span class="info-label">Order ID</span><span class="info-val" id="id">-</span></div>
            <div class="info-item"><span class="info-label">Nomor HP</span><span class="info-val" id="nomor">-</span></div>
        </div>

        <div class="otp-container">
            <div class="otp-box" id="otp" onclick="copyTeks('otp', true)">WAITING</div>
            <div id="status" class="status-text">Ready...</div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="btnCopyNomor" class="btn" style="display:none; background:#334155;" onclick="copyTeks('nomor', true)">COPY NOMOR</button>
            <button id="btnReset" class="btn" style="background:#4b5563; font-size:12px;" onclick="resetOrder()">CLEAR DATA</button>
        </div>
    </div>

    <div class="card">
        <div class="title">🏠 NAMA DAN ALAMAT</div>
        <div class="result-address" id="fullData">
            Nama: <span class="address-val" id="resNama">-</span>
            Alamat: <span class="address-val" id="resAlamat">-</span>
            Detail: <span class="address-val" id="resDetail">-</span>
        </div>
        <button class="btn" style="margin-top:10px; background:#334155; font-size:12px;" onclick="generateAndCopy()">COPY DATA</button>
    </div>

    <div class="card">
        <div class="title">🔗 Link Order</div>
        <div id="linkContainer">
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/6VKFY7rZoL')">AWAW 1 ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/6VKFY7rZoL')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/6px5wm8CN6')">AWAW 2 ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/6px5wm8CN6')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/9fHHK4KU73')">WHITE CYBER ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/9fHHK4KU73')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/4qC1ZEp4uu')">ALFA DIGITAL ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/4qC1ZEp4uu')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/3Vgdyp7e4p')">SRIBUFOLLS ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/3Vgdyp7e4p')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/AADXv6H81t')">HELENA STUFF ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/AADXv6H81t')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/4AwKm7hE75')">SECRET PANEL ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/4AwKm7hE75')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/9KeQve7UK9')">PROMETIXPANEL ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/9KeQve7UK9')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/8fOk8T99r5')">YOAKE 1 ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/8fOk8T99r5')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/3LNDmhKKrw')">YOAKE 2 ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/3LNDmhKKrw')">COPY</button></div>
            <div class="link-group"><span class="link-label" onclick="window.open('https://s.shopee.co.id/2g7J598NmS')">MAMA WHITE CYBER ↗</span><button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/2g7J598NmS')">COPY</button></div>
        </div>
    </div>

</div>

<script>
const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

function showToast(msg) {
  const x = document.getElementById("toast");
  x.innerText = msg;
  x.className = "show";
  setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
}

// Memory Recovery
window.onload = () => {
    if(localStorage.getItem('saved_server')){
        document.getElementById("server").value = localStorage.getItem('saved_server');
    }
    if(localStorage.getItem('saved_op')){
        document.getElementById("operator").value = localStorage.getItem('saved_op');
    }
    if(localStorage.getItem('saved_name')){
        document.getElementById("resNama").innerText = localStorage.getItem('saved_name');
        document.getElementById("resAlamat").innerText = localStorage.getItem('saved_addr');
        document.getElementById("resDetail").innerText = localStorage.getItem('saved_det');
    }
    if(localStorage.getItem('saved_id')){
        orderID = localStorage.getItem('saved_id');
        document.getElementById("id").innerText = orderID;
        document.getElementById("nomor").innerText = localStorage.getItem('saved_num');
        document.getElementById("otp").innerText = localStorage.getItem('saved_otp') || "WAITING";
        document.getElementById("btnCopyNomor").style.display = "block";
        timer = setInterval(cekOTP, 5000);
    }
};

function saveOp() {
    localStorage.setItem('saved_server', document.getElementById("server").value);
    localStorage.setItem('saved_op', document.getElementById("operator").value);
}

const n_depan = ["Ahmad","Budi","Siti","Rina","Dewi","Aisyah","Rizky","Fajar","Eko","Maya","Andi","Sari","Hadi","Yanto","Lestari","Agus","Indah","Mega","Surya","Taufik"];
const n_belakang = ["Santoso","Pratama","Wijaya","Saputra","Rahman","Firmansyah","Kusuma","Hidayat","Setiawan","Nugroho","Purnama","Gunawan","Wibowo","Suherman","Budiman"];
const jalan = ["Jl. Mawar","Jl. Melati","Jl. Merdeka","Jl. Sudirman","Jl. Gajah Mada","Jl. Ahmad Yani","Jl. Diponegoro","Jl. Pahlawan","Jl. Kenanga","Jl. Dahlia"];
const kota = ["Jakarta Selatan","Bandung","Surabaya","Semarang","Medan","Makassar","Bekasi","Tangerang"];
const kodepos = ["12340","40123","60111","50125","20111","90111","17111","15111"];

function generateAndCopy() {
    let nama = n_depan[Math.floor(Math.random()*n_depan.length)] + " " + n_belakang[Math.floor(Math.random()*n_belakang.length)];
    let almt = jalan[Math.floor(Math.random()*jalan.length)] + " No. " + (Math.floor(Math.random()*100)+1);
    let det = kota[Math.floor(Math.random()*kota.length)] + " (" + kodepos[Math.floor(Math.random()*kodepos.length)] + ")";
    
    document.getElementById("resNama").innerText = nama;
    document.getElementById("resAlamat").innerText = almt;
    document.getElementById("resDetail").innerText = det;
    
    localStorage.setItem('saved_name', nama);
    localStorage.setItem('saved_addr', almt);
    localStorage.setItem('saved_det', det);
    
    navigator.clipboard.writeText(`Nama: ${nama}\nAlamat: ${almt}\n${det}`);
    showToast("Data Disalin!");
}

let orderID = "";
let timer;

function pesanNomor(){
  resetOrder();
  const srv = document.getElementById("server").value;
  const op = document.getElementById("operator").value;
  
  document.getElementById("nomor").innerText = "Ordering...";
  
  // Mengirim parameter server ke Cloudflare
  fetch(`https://aihomestore.alazam04.workers.dev/api/order?server=${srv}&operator=${op}`)
  .then(r => r.json())
  .then(res => {
    if(res.number){
      orderID = res.id;
      document.getElementById("id").innerText = res.id;
      document.getElementById("nomor").innerText = res.number;
      document.getElementById("btnCopyNomor").style.display = "block";
      document.getElementById("status").innerText = "Menunggu SMS...";
      
      localStorage.setItem('saved_id', orderID);
      localStorage.setItem('saved_num', res.number);
      localStorage.setItem('active_server', srv); 
      
      navigator.clipboard.writeText(res.number);
      showToast("Nomor Disalin!");
      clearInterval(timer);
      timer = setInterval(cekOTP, 5000);
    } else {
      alert("Gagal: " + (res.error || "Cek saldo / stok operator"));
      document.getElementById("nomor").innerText = "-";
    }
  });
}

function cekOTP(){
  if(!orderID) return;
  const srv = localStorage.getItem('active_server') || "hero";
  
  fetch(`https://aihomestore.alazam04.workers.dev/api/check?server=${srv}&id=${orderID}`)
  .then(r => r.json())
  .then(res => {
    if(res.otp && res.otp !== "-"){
      document.getElementById("otp").innerText = res.otp;
      document.getElementById("status").innerText = "OTP MASUK!";
      localStorage.setItem('saved_otp', res.otp);
      
      notifySound.play();
      navigator.clipboard.writeText(res.otp); // Copy tanpa toast
      
      clearInterval(timer);
    }
  });
}

function resetOrder(){
    clearInterval(timer);
    orderID = "";
    localStorage.removeItem('saved_id');
    localStorage.removeItem('saved_num');
    localStorage.removeItem('saved_otp');
    localStorage.removeItem('active_server');
    document.getElementById("id").innerText = "-";
    document.getElementById("nomor").innerText = "-";
    document.getElementById("otp").innerText = "WAITING";
    document.getElementById("status").innerText = "Ready...";
    document.getElementById("btnCopyNomor").style.display = "none";
}

function copyDirect(t){ navigator.clipboard.writeText(t); showToast("Link Disalin!"); }
function copyTeks(id, manual) { 
    let teks = document.getElementById(id).innerText;
    if(teks === "WAITING" || teks === "-") return;
    navigator.clipboard.writeText(teks); 
    if(manual) showToast("Disalin!"); 
}
</script>
</body>
</html>
