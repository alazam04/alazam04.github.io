<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Engine - Premium Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --bg-dark: #121826; --card-dark: #1e293b; --accent-orange: #f97316; --text-light: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; }
        .main-card { background-color: var(--card-dark); border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        .section-title { font-size: 0.9rem; font-weight: bold; color: #60a5fa; border-left: 4px solid #3b82f6; padding-left: 10px; margin-bottom: 15px; }
        .form-select, .form-control { background-color: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 0.75rem; font-weight: 500; }
        .form-select:focus, .form-control:focus { background-color: #0f172a; color: white; border-color: var(--accent-orange); box-shadow: none; }
        .btn-order { background-color: var(--accent-orange); color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; border: none; transition: 0.3s; margin-top: 10px; }
        .otp-display { background-color: #0f172a; border: 2px dashed #334155; border-radius: 15px; padding: 25px; text-align: center; margin-top: 20px; }
        #otp-box { font-size: 2.8rem; font-weight: 800; color: #fbbf24; letter-spacing: 5px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .btn-util { background-color: #334155; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; }
        .link-item { background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .link-name { font-size: 0.75rem; font-weight: bold; color: #94a3b8; }
        .btn-copy-link { color: #60a5fa; border: 1px solid #3b82f6; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 500px;">
        
        <div class="main-card">
            <div class="section-title">🚀 SHOPEE OTP ENGINE</div>
            
            <div class="row g-2">
                <div class="col-6">
                    <select id="serverSelect" class="form-select" onchange="toggleSmsTarget()">
                        <option value="hero">🚀 HERO SMS</option>
                        <option value="rumah">🏠 RUMAH OTP</option>
                        <option value="smscode">⚡ SMSCODE.GG</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="operatorSelect" class="form-select">
                        <option value="any">TERMURAH</option>
                        <option value="indosat">INDOSAT</option>
                        <option value="telkomsel">TELKOMSEL</option>
                    </select>
                </div>
                
                <div class="col-12 mt-2" id="sniperBox" style="display:none;">
                    <input type="number" id="targetPrice" class="form-control" placeholder="Bidik Harga SMSCode (Misal: 134) - Opsional">
                </div>
            </div>

            <button class="btn-order" onclick="orderNumber()" id="btnOrder">AMBIL NOMOR SHOPEE</button>

            <div class="mt-4">
                <div class="data-row"><span class="text-secondary">Order ID</span><span id="display-id">-</span></div>
                <div class="data-row"><span class="text-secondary">Nomor HP</span><b id="display-number">Ready...</b></div>
            </div>

            <div class="otp-display">
                <div id="otp-box">WAITING</div>
                <div class="status-text text-secondary" style="font-size: 0.8rem;" id="status-desc">Ready...</div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn-util w-50 me-1" onclick="copyNumber()">COPY NOMOR</button>
                <button class="btn-util w-50 ms-1" onclick="clearData()">CLEAR DATA</button>
            </div>
        </div>

        <div class="main-card">
            <div class="section-title">🏠 NAMA DAN ALAMAT</div>
            <div class="p-2 bg-dark rounded border border-secondary mb-3" style="font-size: 0.85rem;">
                <div class="mb-1">Nama: <b id="util-nama" class="text-success">-</b></div>
                <div class="mb-1">Alamat: <b id="util-alamat" class="text-success">-</b></div>
                <div>Detail: <b id="util-detail" class="text-success">-</b></div>
            </div>
            <button class="btn-util w-100" onclick="generateRandomData()">GENERATE DATA BARU</button>
        </div>
        
        <div class="main-card">
            <div class="section-title">🔗 LINK ORDER SHOPEE</div>
            <div class="link-item"><span class="link-name">AWAW 1</span><a href="https://s.shopee.co.id/6VKFY7rZoL" target="_blank" class="btn-copy-link">BUKA</a></div>
            <div class="link-item"><span class="link-name">ALFA DIGITAL</span><a href="https://s.shopee.co.id/4qC1ZEp4uu" target="_blank" class="btn-copy-link">BUKA</a></div>
            <div class="link-item"><span class="link-name">SECRET PANEL</span><a href="https://s.shopee.co.id/4AwKm7hE75" target="_blank" class="btn-copy-link">BUKA</a></div>
            <div class="link-item"><span class="link-name">YOAKE 1</span><a href="https://s.shopee.co.id/8fOk8T99r5" target="_blank" class="btn-copy-link">BUKA</a></div>
        </div>

    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const API_BASE = "https://aihomestore.alazam04.workers.dev/api";
        let checkTimer = null;

        function toggleSmsTarget() {
            const srv = document.getElementById('serverSelect').value;
            document.getElementById('sniperBox').style.display = (srv === 'smscode') ? 'block' : 'none';
        }

        window.onload = () => {
            if(localStorage.getItem('order_id')) {
                document.getElementById('display-id').innerText = localStorage.getItem('order_id');
                document.getElementById('display-number').innerText = localStorage.getItem('phone');
                startPolling();
            }
            if(localStorage.getItem('pref_server')) {
                document.getElementById('serverSelect').value = localStorage.getItem('pref_server');
                toggleSmsTarget();
            }
            if(localStorage.getItem('pref_op')) document.getElementById('operatorSelect').value = localStorage.getItem('pref_op');
        };

        async function orderNumber() {
            const server = document.getElementById('serverSelect').value;
            const operator = document.getElementById('operatorSelect').value;
            const targetPrice = document.getElementById('targetPrice').value;
            const btn = document.getElementById('btnOrder');

            localStorage.setItem('pref_server', server);
            localStorage.setItem('pref_op', operator);

            btn.disabled = true; btn.innerText = "Membidik Target...";
            document.getElementById('display-number').innerText = "Ordering...";

            try {
                // KIRIM REQUEST DENGAN TARGET HARGA (Jika ada)
                const res = await fetch(`${API_BASE}/order?server=${server}&operator=${operator}&targetprice=${targetPrice}`);
                const data = await res.json();

                if (data.id && data.number) {
                    localStorage.setItem('order_id', data.id); localStorage.setItem('phone', data.number);
                    document.getElementById('display-id').innerText = data.id; document.getElementById('display-number').innerText = data.number;
                    document.getElementById('otp-box').innerText = "WAITING"; document.getElementById('otp-box').style.color = "#fbbf24";
                    document.getElementById('status-desc').innerText = "Menunggu SMS...";
                    startPolling();
                } else {
                    alert("Info: " + (data.error || "Gagal"));
                    document.getElementById('display-number').innerText = "Ready...";
                }
            } catch (e) { alert("Error Worker"); } finally {
                btn.disabled = false; btn.innerText = "AMBIL NOMOR SHOPEE";
            }
        }

        function startPolling() { if(checkTimer) clearInterval(checkTimer); checkTimer = setInterval(checkOTP, 5000); }

        async function checkOTP() {
            const id = localStorage.getItem('order_id'); const server = localStorage.getItem('pref_server');
            if(!id) return;
            try {
                const res = await fetch(`${API_BASE}/check?id=${id}&server=${server}`);
                const data = await res.json();
                if (data.otp && data.otp !== "-") {
                    document.getElementById('otp-box').innerText = data.otp;
                    if (data.otp.startsWith("ERR:") || data.otp.startsWith("STAT:")) { document.getElementById('otp-box').style.color = "#ef4444"; } 
                    else {
                        document.getElementById('otp-box').style.color = "#4ade80"; document.getElementById('status-desc').innerText = "OTP MASUK!";
                        document.getElementById('notif-sound').play(); navigator.clipboard.writeText(data.otp); clearInterval(checkTimer);
                    }
                }
            } catch (e) {}
        }

        function clearData() { localStorage.clear(); location.reload(); }
        function copyNumber() { const num = document.getElementById('display-number').innerText; if(num && num !== "Ready...") { navigator.clipboard.writeText(num); alert("Nomor disalin!"); } }
        function generateRandomData() {
            const names = ["Budi Santoso", "Siti Aminah", "Andi Wijaya", "Maya Wibowo"]; const streets = ["Jl. Merdeka No. 10", "Jl. Melati Blok C"]; const cities = ["Jakarta (10110)", "Bandung (40111)"];
            document.getElementById('util-nama').innerText = names[Math.floor(Math.random() * names.length)]; document.getElementById('util-alamat').innerText = streets[Math.floor(Math.random() * streets.length)]; document.getElementById('util-detail').innerText = cities[Math.floor(Math.random() * cities.length)];
        }
    </script>
</body>
</html>
